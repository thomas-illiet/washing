services:
  migrate:
    build: .
    user: "1000:1000"
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    env_file: .env
    command: ["alembic", "upgrade", "head"]
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    user: "1000:1000"
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    env_file: .env
    command: ["uvicorn", "app.api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started
      keycloak:
        condition: service_healthy

  mcp:
    build: .
    user: "1000:1000"
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    env_file: .env
    command: ["uvicorn", "app.mcp.main:app", "--host", "0.0.0.0", "--port", "8001"]
    ports:
      - "8001:8001"
    depends_on:
      api:
        condition: service_started
      keycloak:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8001/health').read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build: .
    user: "1000:1000"
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    env_file: .env
    command: ["celery", "-A", "app.worker.celery.celery_app", "worker", "--loglevel=INFO", "--pool=solo"]
    ports:
      - "9101:9101"
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build: .
    user: "1000:1000"
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    env_file: .env
    command: ["celery", "-A", "app.beat.celery.celery_app", "beat", "--loglevel=INFO"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_started

  flower:
    build: .
    user: "1000:1000"
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    env_file: .env
    command: ["celery", "-A", "app.worker.celery.celery_app", "flower"]
    environment:
      FLOWER_ADDRESS: 0.0.0.0
      FLOWER_PORT: "5555"
      FLOWER_PERSISTENT: "False"
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:5555/healthcheck').read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v3.11.2
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      flower:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:13.0.1
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning/datasources/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana/provisioning/dashboards/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/washing_machine
      KC_DB_SCHEMA: keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KC_HEALTH_ENABLED: "true"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_DEV_USER_PASSWORD: ${KEYCLOAK_DEV_USER_PASSWORD}
      KEYCLOAK_DEV_ADMIN_PASSWORD: ${KEYCLOAK_DEV_ADMIN_PASSWORD}
      OIDC_USER_ROLE_NAME: ${OIDC_USER_ROLE_NAME}
      OIDC_ADMIN_ROLE_NAME: ${OIDC_ADMIN_ROLE_NAME}
      OIDC_SWAGGER_CLIENT_ID: ${OIDC_SWAGGER_CLIENT_ID}
    command: ["start-dev", "--import-realm", "--http-port=8080", "--hostname-strict=false"]
    volumes:
      - ./config/keycloak/washing-machine-realm.json:/opt/keycloak/data/import/washing-machine-realm.json:ro
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bash",
          "-c",
          "{ printf 'HEAD /health/ready HTTP/1.0\\r\\n\\r\\n' >&0; grep 'HTTP/1.0 200'; } 0<>/dev/tcp/localhost/9000",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: washing_machine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./config/postgres/init:/docker-entrypoint-initdb.d:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d washing_machine"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  grafana_data:
  prometheus_data:
