global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8000

  - job_name: worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - worker:9101

  - job_name: beat
    metrics_path: /metrics
    static_configs:
      - targets:
          - beat:9101

  - job_name: flower
    metrics_path: /metrics
    static_configs:
      - targets:
          - flower:5555
