apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Postgres App
    uid: postgres-app
    type: postgres
    access: proxy
    url: db:5432
    user: postgres
    editable: false
    jsonData:
      database: washing_machine
      postgresVersion: 1600
      sslmode: disable
      timescaledb: false
    secureJsonData:
      password: postgres
